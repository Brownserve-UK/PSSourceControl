---
name: release
on:
  workflow_dispatch:
    inputs:
      publish_to:
        description: 'Where to publish the release to'
        required: true
        default: '"nuget", "PSGallery", "GitHub"'
        type: string

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Step 1: Generate a short-lived token from the GitHub App
      - name: generate-app-token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.BROWNSERVE_CI_APP_ID }}
          private-key: ${{ secrets.BROWNSERVE_CI_APP_PRIVATE_KEY }}
      # Step 2: Checkout the repo
      - name: checkout-module
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: Brownserve.PSSourceControl
      # Step 3: Install Mono (required to run NuGet.exe on Linux)
      - name: install-mono
        run: sudo apt-get install -y mono-complete
      # Step 4: Run the build script
      - name: run-build-script
        shell: pwsh
        env:
          GitHubToken: ${{ steps.app-token.outputs.token }}
          NugetFeedAPIKey: ${{ secrets.NUGET_API_KEY }}
          PSGalleryAPIKey: ${{ secrets.POWERSHELL_GALLERY_API_KEY }}
        run: |
            $Params = @{
              BranchName = $env:GITHUB_REF
              GitHubRepoName = 'Brownserve.PSSourceControl'
              Build = 'Release'
              GitHubReleaseToken = $env:GitHubToken
              NugetFeedApiKey = $env:NugetFeedAPIKey
              PSGalleryAPIKey = $env:PSGalleryAPIKey
              PublishTo = ${{ inputs.publish_to }}
              Verbose = $true
            }
            ./Brownserve.PSSourceControl/.build/build.ps1 @Params
      # Step 5: Push a notification to Slack
      - name: notify-slack
        shell: pwsh
        if: ${{ always() }}
        env:
          BUILD_NOTIFICATION_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_BUILD }}
          BUILD_BRANCH: ${{ github.ref }}
        run: |
            ./Brownserve.PSSourceControl/.build/_init.ps1
            Send-BuildNotification `
              -BuildName ${{ github.job }} `
              -BuildStatus ${{ job.status }} `
              -Webhook $env:BUILD_NOTIFICATION_WEBHOOK `
              -RepoBranch $env:BUILD_BRANCH `
              -RepoName $global:BrownserveRepoName

  deploy-docs:
    name: Deploy documentation
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed for gh-deploy to push to gh-pages branch
    steps:
      # Step 1: Checkout the repo
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      # Step 2: Set up Python
      - name: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'
      # Step 3: Install MkDocs and build/deploy the site
      - name: deploy-docs
        run: |
          pip install -r requirements.txt
          mkdocs gh-deploy --force
